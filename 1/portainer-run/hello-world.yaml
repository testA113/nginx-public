apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hello-world-data
  namespace: portainer-run
  labels:
    app: hello-world
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: a291fac1-c1ca-408d-9795-0c4c5561cbb6
    portainer-run/git-branch: main
    portainer-run/git-path: 1/portainer-run/hello-world.yaml
    portainer-run/vibe-source-path: 1/portainer-run/hello-world/src
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: portainer-run
  labels:
    app: hello-world
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: a291fac1-c1ca-408d-9795-0c4c5561cbb6
    portainer-run/git-branch: main
    portainer-run/git-path: 1/portainer-run/hello-world.yaml
    portainer-run/vibe-source-path: 1/portainer-run/hello-world/src
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
        managed-by: portainer-run
    spec:
      initContainers:
        - name: vibe-sync
          image: alpine/git:latest
          command:
            - sh
            - '-c'
            - >-
              git config --global http.sslVerify false && git clone --depth 1 --branch main
              https://${GIT_USERNAME}:${GIT_TOKEN}@github.com/testa113/nginx-public /tmp/repo && mkdir -p /app && cp -r
              /tmp/repo/1/portainer-run/hello-world/src/. /app/ && rm -rf /tmp/repo
          volumeMounts:
            - name: app-data
              mountPath: /app
          env:
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hello-world-git-credentials
                  key: username
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hello-world-git-credentials
                  key: token
        - name: vibe-install
          image: node:22
          command:
            - sh
            - '-c'
            - cd /app && if [ -f package.json ]; then npm install --production 2>&1; fi
          volumeMounts:
            - name: app-data
              mountPath: /app
      containers:
        - name: hello-world
          image: node:22
          command:
            - sh
            - '-c'
            - npm start
          workingDir: /app
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: app-data
              mountPath: /app
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: hello-world-data
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world
  namespace: portainer-run
  labels:
    app: hello-world
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: a291fac1-c1ca-408d-9795-0c4c5561cbb6
    portainer-run/git-branch: main
    portainer-run/git-path: 1/portainer-run/hello-world.yaml
    portainer-run/vibe-source-path: 1/portainer-run/hello-world/src
spec:
  type: ClusterIP
  selector:
    app: hello-world
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-world
  namespace: portainer-run
  labels:
    app: hello-world
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: a291fac1-c1ca-408d-9795-0c4c5561cbb6
    portainer-run/git-branch: main
    portainer-run/git-path: 1/portainer-run/hello-world.yaml
    portainer-run/vibe-source-path: 1/portainer-run/hello-world/src
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: hello-world.k0s-4cd5538a19b8-01.internal.portainercloud.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-world
                port:
                  number: 3000
